# here you can change the different materials shown in the menu
claimed_material: "emerald_block" # shows if the daily reward has already been claimed
to_claim_material: "gold_block" # shows if the daily reward needs to be claimed
cannot_claim_material: "redstone_block" # shows if the daily reward cannot be claimed

# here you can define what items are given to the player, or any commands that are run when they claim the reward
# you can use <p> as a placeholder for the player's name
# commands do not need '/' in front of them, and will be run from the console
rewards:
  day1:
    items: ["diamond:2", "golden_apple:1"]
    commands: ["eco give <p> 50"]
